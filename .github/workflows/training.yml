## ─────────────────────────────────────────────────────────────────────────
## GitHub Actions — ML Training Pipeline + Docker Build & Push
## Student : Timotius Kristafael Harjanto
## Criterion 3 — Advanced
##
## Required GitHub Secrets:
##   DAGSHUB_USERNAME    — DagsHub account username
##   DAGSHUB_TOKEN       — DagsHub personal access token
##   DOCKER_USERNAME     — Docker Hub username
##   DOCKER_PASSWORD     — Docker Hub password / access token
##
## Pipeline:
##   1.  Checkout code
##   2.  Set up Python 3.12.7
##   3.  Install dependencies
##   4.  Download preprocessed dataset (from Eksperimen repo artifact or inline)
##   5.  Run MLflow Project  (mlflow run .)
##   6.  Upload trained model as GitHub Artifact
##   7.  Build Docker image  (multi-arch via buildx)
##   8.  Push Docker image to Docker Hub
##   9.  Create GitHub Release with model artifact
## ─────────────────────────────────────────────────────────────────────────

name: ML Training Pipeline — CI/CD

on:
  push:
    branches: ["main", "master"]
    paths:
      - "MLProject/**"
      - ".github/workflows/training.yml"

  workflow_dispatch:
    inputs:
      n_estimators:
        description: "RF: number of trees"
        required: false
        default: "200"
      max_depth:
        description: "RF: max tree depth (0 = unlimited)"
        required: false
        default: "20"
      min_samples_split:
        description: "RF: min samples to split a node"
        required: false
        default: "2"
      min_samples_leaf:
        description: "RF: min samples per leaf"
        required: false
        default: "1"

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/adult-income-ml
  PYTHON_VERSION: "3.12.7"

jobs:
  # ══════════════════════════════════════════════════════════════
  train:
    name: "Train Model — MLflow Project"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    outputs:
      model_version: ${{ steps.tag.outputs.version }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ── 3. Dependencies ────────────────────────────────────────
      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            mlflow==2.19.0 \
            scikit-learn==1.5.2 \
            pandas==2.2.3 \
            numpy==1.26.4 \
            matplotlib==3.9.2 \
            seaborn==0.13.2 \
            dagshub==0.3.45 \
            psutil==5.9.8

      # ── 4. Verify preprocessed dataset from Criterion 1 ──────────
      # Dataset is already committed from Eksperimen_SML preprocessing pipeline.
      # We do NOT re-preprocess here — that would be inconsistent with Criterion 1.
      - name: Verify preprocessed dataset
        run: |
          echo "=== Verifying dataset from Criterion 1 ==="
          ls -lh MLProject/dataset_preprocessed/
          test -f MLProject/dataset_preprocessed/train.csv \
            && echo "train.csv found: $(wc -l < MLProject/dataset_preprocessed/train.csv) rows" \
            || (echo "ERROR: train.csv not found" && exit 1)
          test -f MLProject/dataset_preprocessed/test.csv \
            && echo "test.csv  found: $(wc -l < MLProject/dataset_preprocessed/test.csv) rows" \
            || (echo "ERROR: test.csv not found" && exit 1)
          echo "Dataset verified — using output from Criterion 1 preprocessing pipeline."

      # ── 5. Run MLflow Project ──────────────────────────────────
      - name: Execute MLflow Project
        working-directory: MLProject
        env:
          DAGSHUB_USERNAME:          ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN:             ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI:       https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_TimotiusKristafaelHarjanto.mlflow
          MLFLOW_TRACKING_USERNAME:  ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD:  ${{ secrets.DAGSHUB_TOKEN }}
          MPLBACKEND:                Agg
        run: |
          mlflow run . --env-manager=local \
            -P n_estimators=${{ github.event.inputs.n_estimators || '200' }} \
            -P max_depth=${{ github.event.inputs.max_depth || '20' }} \
            -P min_samples_split=${{ github.event.inputs.min_samples_split || '2' }} \
            -P min_samples_leaf=${{ github.event.inputs.min_samples_leaf || '1' }} \
            -P dagshub_username=${{ secrets.DAGSHUB_USERNAME }} \
            -P data_path=./dataset_preprocessed/

      # ── 6. Upload model artifact ───────────────────────────────
      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-run-${{ github.run_number }}
          path: |
            MLProject/model/
            MLProject/artifacts/
          retention-days: 90

      # ── 7. Compute version tag ─────────────────────────────────
      - name: Compute version tag
        id: tag
        run: echo "version=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

  # ══════════════════════════════════════════════════════════════
  docker:
    name: "Build & Push Docker Image"
    needs: train
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model-run-${{ github.run_number }}
          path: MLProject/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context:    MLProject
          file:       MLProject/Dockerfile
          push:       true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ needs.train.outputs.model_version }}
            ${{ env.DOCKER_IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Image digest
        run: echo "Docker image pushed successfully"

  # ══════════════════════════════════════════════════════════════
  release:
    name: "Create GitHub Release"
    needs: [train, docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download model artifact for release
        uses: actions/download-artifact@v4
        with:
          name: trained-model-run-${{ github.run_number }}
          path: release-assets/

      - name: Compress model
        run: |
          cd release-assets
          tar -czf ../model-${{ needs.train.outputs.model_version }}.tar.gz .

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.train.outputs.model_version }}"
          gh release create "$VERSION" \
            "model-${VERSION}.tar.gz" \
            --title "Model Release ${VERSION}" \
            --notes "Automated release | Run ${{ github.run_number }} | Commit ${{ github.sha }} | Docker: docker pull ${{ env.DOCKER_IMAGE }}:${VERSION}" \
            --repo "${{ github.repository }}"
